<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Madhuri Shivsharan Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;                            
  box-sizing:border-box;
  font-family: 'Montserrat', sans-serif;
}

/* HERO */
.hero{
  height:100vh;
  background: url("images/skill/6.png") no-repeat center center/cover; /* ✅ FIXED PATH */
  position:relative;
  color:white;
}

/* OVERLAY */
.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6); /* slightly darker for better text */
}

/* CENTER CONTENT */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  width:100%;
  z-index:2;
}

/* ICON */
.icon{
  width:80px;
  height:80px;
  border:1px solid white;
  border-radius:50%;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

/* LINES */
.line, .bottom-line{
  width:75%;
  height:1px;
  background:rgba(255,255,255,0.4);
  margin:25px auto;
  position:relative;
}

/* vertical line top */
.line::after{
  content:"";
  position:absolute;
  left:50%;
  top:-60px;
  width:1px;
  height:60px;
  background:rgba(255,255,255,0.4);
}

/* vertical line bottom */
.bottom-line::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:-60px;
  width:1px;
  height:60px;
  background:rgba(255,255,255,0.4);
}

/* TEXT */
h1{
  font-size:36px;
  letter-spacing:8px;
  margin:25px 0;
}

.hero p{
  font-size:13px;
  letter-spacing:4px;
  color:#ddd;
  max-width:800px;
  margin:auto;
  line-height:1.6;
}

/* MENU */
.menu{
  display:flex;
  justify-content:center;
  border:1px solid rgba(255,255,255,0.4);
  width:fit-content;
  margin:40px auto 0;
}

.menu a{
  padding:12px 22px;
  color:white;
  text-decoration:none;
  font-size:12px;
  letter-spacing:2px;
  border-right:1px solid rgba(255,255,255,0.4);
  transition:0.3s;
}

.menu a:last-child{
  border-right:none;
}

.menu a:hover{
  background:white;
  color:black;
}

</style>
</head>

<body>

<section class="hero">

<div class="center">

  <div class="icon">💎</div>

  <div class="line"></div>

  <h1>HI, I AM MADHURI SHIVSHARAN!</h1>

  <p>
    I’M A ASPIRING DATA ANALYST SKILLED IN POWER BI, SQL AND EXCEL,
    WHO TURNS UNCERTAINTY INTO CLARITY AND MAKES DATA WORK FOR YOU.
  </p>

  <div class="bottom-line"></div>

  <!-- MENU -->
  <div class="menu">
    <a href="about.html">ABOUT ME</a>
    <a href="skill.html">SKILLS</a>
    <a href="project.html">PROJECTS</a>
    <a href="experience.html">EXPERIENCE</a>
    <a href="certifications.html">CERTIFICATIONS</a>
    <a href="contact.html">CONTACT</a>
  </div>

</div>

</section>

</body>
</html>
